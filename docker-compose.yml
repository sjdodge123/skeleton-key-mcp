# Skeleton Key MCP — deploy on your NAS (e.g. import this stack in Portainer).
#
# SECURITY: This binds to the LAN only. Do NOT put it behind an internet-facing
# reverse proxy or publish the port to the WAN. Remote access = VPN into the LAN.
services:
  skeleton-key:
    # Pull the prebuilt image published by CI (recommended for the NAS):
    image: ghcr.io/sjdodge123/skeleton-key-mcp:latest
    # To build locally instead, comment out `image:` above and uncomment:
    # build: .
    container_name: skeleton-key
    restart: unless-stopped
    ports:
      # Bind to a specific LAN interface address, not 0.0.0.0, so it is never
      # exposed beyond your local network. Replace 192.168.1.10 with this host's
      # LAN IP.
      - "192.168.1.10:8787:8787"
    # Optional: use host networking instead of the port mapping above if you want
    # the built-in LAN service discovery to scan your real subnet directly. On a
    # bridged network (the default) the container only sees Docker's internal
    # network, so either use host networking or type your subnet into the scan.
    # network_mode: host
    environment:
      SKELETON_KEY_PORT: "8787"
      SKELETON_KEY_BIND_HOST: "0.0.0.0" # inside the container; the port map above scopes it to the LAN
      # Optional: the absolute URL clients reach this box at. Skeleton Key
      # auto-detects a LAN address on first boot, so this is only needed to
      # override it (e.g. a hostname, a different port, or when auto-detection
      # picks the wrong interface). Used for the clickable unlock and
      # credential-hand-off links; deliberately never taken from a request Host
      # header. Example:
      # SKELETON_KEY_PUBLIC_URL: "http://192.168.1.10:8787"
      # Boot auto-unlock: enable it from the web UI (setup wizard or the unlock
      # page). Skeleton Key then writes a RANDOM unlock key — never your
      # passphrase — into the host directory mounted below, and unlocks itself
      # on restart. Nothing secret goes in this file; just add the volume mount.
      # Optional override of where the key file lives inside the container:
      # SKELETON_KEY_UNLOCK_KEY_FILE: "/run/secrets/skeleton-key/unlock-key"
      # DEPRECATED (still honored, warns at boot): passphrase-in-environment
      # auto-unlock. Prefer the web-UI flow above, which keeps the passphrase
      # out of this file, portainer.db, and the host entirely.
      # SKELETON_KEY_PASSPHRASE_FILE: "/run/secrets/skeleton_key_passphrase"
      # SKELETON_KEY_PASSPHRASE: "change-me"
      # Either way, any auto-unlock trades away the restart kill-switch: anyone
      # who can restart the container gets an unlocked instance.
      # Blunt kill-switch for all state-changing tools:
      # SKELETON_KEY_DISABLE_EXECUTE: "1"
    volumes:
      - skeleton-key-data:/data
      # For boot auto-unlock: mount a host directory where Skeleton Key stores
      # its generated unlock key. Keep it OUT of the /data volume (a copy of
      # /data alone must never contain both the encrypted store and its key),
      # writable by the container's `node` user (uid 1000), and private:
      #   mkdir -p /volume1/docker/secrets/skeleton-key
      #   chown 1000:1000 /volume1/docker/secrets/skeleton-key
      #   chmod 700 /volume1/docker/secrets/skeleton-key
      # - /volume1/docker/secrets/skeleton-key:/run/secrets/skeleton-key
    labels:
      # Opt this container into Watchtower auto-updates. When CI publishes a new
      # :latest, Watchtower pulls it and recreates the container on its next poll;
      # the /data volume persists so no re-setup. Force an immediate update with:
      #   docker exec watchtower /watchtower --run-once skeleton-key
      com.centurylinklabs.watchtower.enable: "true"

volumes:
  skeleton-key-data:
